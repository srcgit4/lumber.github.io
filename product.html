<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Product — Lumber.ca</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar__inner">
      <a class="brand" href="index.html"><span class="brand__badge">Lumber</span><span class="brand__dot">.ca</span></a>
      <div class="search">
        <input id="searchInput" type="search" placeholder="Search products..." />
        <button id="searchBtn" class="btn btn--brown">Search</button>
      </div>
      <div class="topbar__icons">
        <a class="iconbtn" href="dashboard.html" aria-label="Account">👤</a>
        <button class="iconbtn" id="openCartBtn" aria-label="Cart">🛒<span class="cartCount" id="cartCount">0</span></button>
      </div>
    </div>
    <nav class="nav">
      <div class="wrap nav__inner">
        <a class="nav__link" href="index.html">Home</a>
        <a class="nav__link" href="products.html">Products</a>
        <a class="nav__link" href="deals.html">Deals</a>
        <a class="nav__link" href="contact.html">Contact</a>
        <a class="nav__link" href="about.html">About</a>
        <a class="nav__link" href="#" id="navCartLink">Cart</a>
      </div>
    </nav>
  </header>

  <aside class="drawer" id="cartDrawer" aria-hidden="true">
    <div class="drawer__panel" role="dialog" aria-modal="true" aria-label="Cart">
      <div class="drawer__head">
        <div class="drawer__title">Your Cart</div>
        <button class="iconbtn" id="closeCartBtn" aria-label="Close cart">✕</button>
      </div>
      <div class="drawer__body" id="cartItems"></div>
      <div class="drawer__foot">
        <div class="drawer__row"><span>Subtotal</span><strong id="cartSubtotal">$0.00</strong></div>
        <a class="btn btn--brown w-100" href="checkout.html">Checkout</a>
      </div>
    </div>
    <button class="drawer__backdrop" id="drawerBackdrop" aria-label="Close"></button>
  </aside>

  <main class="section">
    <div class="wrap">
      <div class="productView" id="productView"></div>

      <div class="tabs">
        <button class="tab is-active" data-tab="desc">Description</button>
        <button class="tab" data-tab="specs">Specifications</button>
        <button class="tab" data-tab="reviews">Reviews</button>
      </div>

      <div class="tabPanel is-active" id="tab-desc"></div>
      <div class="tabPanel" id="tab-specs"></div>
      <div class="tabPanel" id="tab-reviews"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="wrap footer__inner">
      <div><div class="footer__title">LUMBER.CA</div><div class="muted">Canada-wide supply</div><div class="muted">Calgary, AB</div></div>
      <div><div class="footer__title">LINKS</div><a href="products.html">Products</a><a href="deals.html">Deals</a><a href="contact.html">Contact</a></div>
      <div><div class="footer__title">LEGAL</div><a href="#">Privacy</a><a href="#">Terms</a></div>
      <div><div class="footer__title">SOCIAL</div><div class="socialRow"><span class="social">◎</span><span class="social">◯</span><span class="social">◍</span></div></div>
    </div>
    <div class="footer__bottom">© <span id="year"></span> Lumber.ca</div>
  </footer>

  <script src="assets/app.js"></script>
  <script>renderProductDetail();</script>
</body>
</html>
